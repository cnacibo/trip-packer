name: trip_packer
description: "Trip Planning App."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.3
  get_it: ^9.2.1
  firebase_analytics: ^12.1.3
  firebase_auth: ^6.2.0
  firebase_core: ^4.5.0
  flutter_riverpod: ^3.3.1
  geocoding: ^4.0.0
  uuid: ^4.5.3
  http: ^1.6.0
  path_provider: ^2.1.5
  drift: ^2.31.0
  equatable: ^2.0.5
  sqlite3_flutter_libs: ^0.5.18
  path: ^1.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: "^0.13.1"
  build_runner: ^2.4.13
  drift_dev: ^2.14.0
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png" 
  min_sdk_android: 21             
  remove_alpha_ios: true           
  adaptive_icon_background: "#FFFFFF"    
  web:
    generate: true
    image_path: "assets/icon/icon.png"
  windows:
    generate: true
    image_path: "assets/icon/icon.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/icon/icon.png"
